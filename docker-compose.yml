services:
  db:
    container_name: freeflix-db
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-freeflix}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-freeflix}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - freeflix-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-freeflix}
      DOWNLOAD_PATH: /opt/freeflix/downloads
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/opt/freeflix/downloads
      - resume-data:/opt/freeflix/resume_data
      - logs:/opt/freeflix/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - freeflix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - freeflix-network

networks:
  freeflix-network:
    driver: bridge

volumes:
  postgres-data:
  resume-data:
  logs:
